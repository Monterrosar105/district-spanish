<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>District Spanish Admin Dashboard</title>
  <link rel="icon" type="image/png" href="../images/logo-tab.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="dashboard">
  <nav class="admin-navbar">
    <div class="admin-navbar-container">
      <div class="navbar-logo">
        <img src="../images/logo.png" alt="District Spanish Logo" class="logo-img">
      </div>
      <div class="admin-navbar-actions">
        <a href="../index.html" class="admin-nav-link">Website</a>
        <button id="logoutBtn" class="btn-secondary">Log Out</button>
      </div>
    </div>
  </nav>

  <main class="admin-main">
    <section class="panel">
      <h2>Form Tracking Overview</h2>
      <div class="metric-grid" id="metricsGrid">
        <article class="metric-card">
          <h3>Total Leads</h3>
          <p id="metricTotalLeads">0</p>
        </article>
        <article class="metric-card">
          <h3>Today</h3>
          <p id="metricLeadsToday">0</p>
        </article>
        <article class="metric-card">
          <h3>Enrolled</h3>
          <p id="metricEnrolledLeads">0</p>
        </article>
      </div>
      <div class="status-breakdown">
        <h3>Status Breakdown (Current Filters)</h3>
        <ul id="statusBreakdownList"></ul>
      </div>
    </section>

    <section class="panel">
      <h2>Form Submission Tracking</h2>
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Search by name, email, phone">
        <select id="statusFilter">
          <option value="">All statuses</option>
          <option value="new">new</option>
          <option value="contacted">contacted</option>
          <option value="follow-up">follow-up</option>
          <option value="trial-scheduled">trial-scheduled</option>
          <option value="enrolled">enrolled</option>
          <option value="closed-lost">closed-lost</option>
        </select>
        <select id="levelFilter">
          <option value="">All levels</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
        <button id="refreshBtn" class="btn-secondary">Refresh</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><button type="button" class="sort-btn" data-sort="name">Name</button></th>
              <th><button type="button" class="sort-btn" data-sort="email">Email</button></th>
              <th><button type="button" class="sort-btn" data-sort="phone">Phone</button></th>
              <th><button type="button" class="sort-btn" data-sort="spanish_level">Level</button></th>
              <th><button type="button" class="sort-btn" data-sort="created_at">Date Submitted</button></th>
              <th>Status</th>
              <th>Admin Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="leadsTableBody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="prevPageBtn" class="btn-secondary">Previous</button>
        <span id="pageInfo">Page 1</span>
        <button id="nextPageBtn" class="btn-secondary">Next</button>
      </div>

      <p id="dashboardStatus" class="status"></p>
    </section>
  </main>

  <div id="leadDetailModal" class="detail-modal" aria-hidden="true">
    <div class="detail-modal-overlay" data-close-detail-modal="true"></div>
    <div class="detail-modal-card" role="dialog" aria-modal="true" aria-labelledby="leadDetailTitle">
      <div class="detail-modal-header">
        <h3 id="leadDetailTitle">Lead Details</h3>
        <button id="closeLeadDetailModal" class="btn-secondary">Close</button>
      </div>
      <div id="leadDetailContent" class="detail-content">Loading...</div>
    </div>
  </div>

  <script src="./admin.js"></script>
</body>
</html>
